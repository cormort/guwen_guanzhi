<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古文觀止導覽</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>古文觀止導覽</h1>
        <p class="subtitle">結構分析 · 寫作技巧 · 白話改編</p>
    </header>

    <main>
        <section class="intro">
            <h2>關於這個網站</h2>
            <p>《古文觀止》由清人吳楚材、吳調侯叔侄編選，收錄上起周代下至明末的 222 篇經典散文，是三百年來最重要的古文選本。</p>
            <p>本網站以三階段完成全部 222 篇導讀：</p>
            <div class="phase-cards">
                <div class="card active">
                    <h3>Phase 1</h3>
                    <p>會考／學測常考篇</p>
                    <span class="count">30 篇</span>
                </div>
                <div class="card">
                    <h3>Phase 2</h3>
                    <p>Top 50 名篇</p>
                    <span class="count">50 篇</span>
                </div>
                <div class="card">
                    <h3>Phase 3</h3>
                    <p>其餘全部</p>
                    <span class="count">142 篇</span>
                </div>
            </div>
        </section>

        <section class="content">
            <h2>📖 Phase 1：會考／學測常考 30 篇</h2>
            <p class="meta">主筆：@Jonh_mini_bot · 背景：軍師</p>
            <div id="essay-list" class="essay-list"></div>
        </section>
    </main>

    <footer>
        <p>github.com/cormort/guwen-guanzhi</p>
    </footer>

    <script>
        const essays = [
            { id: "01-zhengbo-keduan", title: "鄭伯克段于鄢", author: "左丘明", era: "左傳·隱公元年", status: "bg", bg: "✓" },
            { id: "02-caogui-lunzhan", title: "曹劌論戰", author: "左丘明", era: "左傳·莊公十年", status: "bg", bg: "✓" },
            { id: "03-gongzhiqi", title: "宮之奇諫假道", author: "左丘明", era: "左傳·僖公五年", status: "bg", bg: "✓" },
            { id: "04-zhuwuzhi", title: "燭之武退秦師", author: "左丘明", era: "左傳·僖公三十年", status: "bg", bg: "✓" },
            { id: "05-jianshu", title: "蹇叔哭師", author: "左丘明", era: "左傳·僖公三十二年", status: "bg", bg: "✓" },
            { id: "06-zhaogong", title: "召公諫厲王止謗", author: "左丘明", era: "國語·周語", status: "pending" },
            { id: "07-zouji", title: "鄒忌諷齊王納諫", author: "劉向", era: "戰國策·齊策", status: "pending" },
            { id: "08-chuzhe", title: "觸讋說趙太后", author: "劉向", era: "戰國策·趙策", status: "pending" },
            { id: "09-fengxuan", title: "馮諼客孟嘗君", author: "劉向", era: "戰國策·齊策", status: "pending" },
            { id: "10-jianzhuke", title: "諫逐客書", author: "李斯", era: "秦文", status: "pending" },
            { id: "11-buju", title: "卜居", author: "屈原", era: "楚辭", status: "pending" },
            { id: "12-hongmen", title: "鴻門宴", author: "司馬遷", era: "史記·項羽本紀", status: "pending" },
            { id: "13-baoren", title: "報任少卿書", author: "司馬遷", era: "漢文", status: "pending" },
            { id: "14-chushi", title: "出師表", author: "諸葛亮", era: "漢文", status: "pending" },
            { id: "15-chenqing", title: "陳情表", author: "李密", era: "六朝文", status: "pending" },
            { id: "16-lanting", title: "蘭亭集序", author: "王羲之", era: "六朝文", status: "pending" },
            { id: "17-guiqulai", title: "歸去來辭", author: "陶淵明", era: "六朝文", status: "pending" },
            { id: "18-taohuayuan", title: "桃花源記", author: "陶淵明", era: "六朝文", status: "pending" },
            { id: "19-wuliu", title: "五柳先生傳", author: "陶淵明", era: "六朝文", status: "pending" },
            { id: "20-jianzong", title: "諫太宗十思疏", author: "魏徵", era: "唐文", status: "pending" },
            { id: "21-shiyue", title: "師說", author: "韓愈", era: "唐文", status: "pending" },
            { id: "22-jishier", title: "祭十二郎文", author: "韓愈", era: "唐文", status: "pending" },
            { id: "23-efang", title: "阿房宮賦", author: "杜牧", era: "唐文", status: "pending" },
            { id: "24-yueyang", title: "岳陽樓記", author: "范仲淹", era: "宋文", status: "pending" },
            { id: "25-zuiong", title: "醉翁亭記", author: "歐陽脩", era: "宋文", status: "pending" },
            { id: "26-qiusheng", title: "秋聲賦", author: "歐陽脩", era: "宋文", status: "pending" },
            { id: "27-chibifu", title: "前赤壁賦", author: "蘇軾", era: "宋文", status: "pending" },
            { id: "28-liuguo", title: "六國論", author: "蘇洵", era: "宋文", status: "pending" },
            { id: "29-du-mengchang", title: "讀孟嘗君傳", author: "王安石", era: "宋文", status: "pending" },
            { id: "30-you-baochanshan", title: "遊褒禪山記", author: "王安石", era: "宋文", status: "pending" },
        ];

        function statusBadge(s) {
            if (s === "bg") return '<span class="badge bg">背景✓</span>';
            if (s === "done") return '<span class="badge done">完成✓</span>';
            return '<span class="badge pending">待寫</span>';
        }

        const list = document.getElementById("essay-list");
        essays.forEach((e, i) => {
            const div = document.createElement("div");
            div.className = "essay-item";
            div.innerHTML = `
                <span class="num">${String(i+1).padStart(2, "0")}</span>
                <span class="title">${e.title}</span>
                <span class="author">${e.author}</span>
                <span class="era">${e.era}</span>
                <span class="badges">${statusBadge(e.status)}</span>
            `;
            list.appendChild(div);
        });
    </script>
</body>
</html>
