    {n:137,id:"166-yangyun-bao-sun-huizong-shu",title:"報孫會宗書背景資料",author:"孫會宗是那封「關心」的信的作者——但正是他的關心——間接導致了楊惲的死亡。他寫信勸楊惲「閉門思過」「當大臣廢退，當闔門惶懼，為可憐之意」——你應該關上門、表現出恐懼和可憐的樣子——而不是飲酒作樂、經商置產。楊惲的回信就是對這個「建議」的激烈反駁",era:"《漢書·楊惲傳》——見《漢書》卷六十六"},

    {n:143,id:"172-wangxizhi-lanting-ji-xu",title:"蘭亭集序背景資料",author:"注意「亦」字——「也」——王羲之的意思是——不僅僅是我們今天的人——被古人的文字感動——未來的人——也將被我們的文字感動——歷史的鏈條——是「感動」——不是「教訓」——這是中國文學史上——最早的一段關於「讀者」與「作者」之間情感共鳴的宣言",era:"《晉書·王羲之傳》——唐太宗親自為王羲之作傳，並將〈蘭亭集序〉收入其中——這是正史中唯一一篇由皇帝親自作注的名人傳記"},

    {n:147,id:"176-kongzhigui-beishan-yiwen",title:"北山移文背景資料",author:"兩人是同代人——都在南齊朝廷任官——很可能認識。有人認為兩人關係不錯——〈北山移文〉只是一篇「遊戲文章」——文人朋友間的開玩笑——並非真正的惡意攻擊。但無論如何——這篇文章的諷刺力量——超越了作者和當事人的私人關係——它成為了一種「類型」——一種關於「偽君子」的永恆批判",era:"《文選》卷四十三——蕭統《昭明文選》收錄此篇，歸入「移」類；「移文」是古代一種官方文書，用於同級官府之間的通告或責備"},

    {n:158,id:"187-hanyu-huo-lin-jie",title:"獲麟解背景資料",author:"每一個時代——都有「不被理解」的藝術家、作家、思想家——他們的風格——不屬於任何「類別」——他們的作品——賣不出去——不被看好——被嘲笑——但——時間證明了——他們是「麒麟」——梵谷生前——只賣出一幅畫——卡夫卡——要求朋友燒掉他的手稿——哥白尼——被教會審判——他們——都是「不被認識的麒麟」——而韓愈——在他們之前的八百年——就已經——替他們說話了",era:"《韓昌黎集》——韓愈詩文合集，由其門人李漢編纂，共四十卷；〈獲麟解〉為韓愈雜說中的一篇短文"},

    {n:163,id:"192-hanyu-wuzhe-wangchengfu-zhuan",title:"圬者王承福傳背景資料",author:"",era:"《韓昌黎集》——韓愈詩文合集——卷十二〈傳〉類——〈圬者王承福傳〉為韓愈為平民立傳的代表作"},
    {n:164,id:"193-hanyu-hui-bian",title:"諱辯背景資料",author:"",era:"《韓昌黎集》——韓愈詩文合集——卷十二〈雜著〉類——〈諱辯〉為韓愈為友人李賀辯護而作的論辯文"},
    {n:165,id:"194-hanyu-zhengchen-lun",title:"爭臣論背景資料",author:"",era:"《韓昌黎集》——韓愈詩文合集，由其門人李漢編纂，共四十卷；〈爭臣論〉為韓愈論說文的代表作之一，以尖銳批評諫官不作為而聞名"},
    {n:166,id:"195-hanyu-hou-shi-jiu-ri-fu-shang-zaixiang-shu",title:"後十九日復上宰相書背景資料",author:"韓愈本文作者——二十八歲的落第進士——困居長安——三上書於宰相——急於求仕、宰相未具名——據考證可能為趙憬、賈耽、盧邁等人——韓愈三上書——皆不報——宰相的不回應——反襯了韓愈的急切與卑微",era:"《韓昌黎集》——韓愈詩文合集，由其門人李漢編纂，共四十卷；〈後十九日復上宰相書〉為韓愈三上宰相書之二（或三），是韓愈求仕時期最真實、最急切的自我寫照"},
    {n:167,id:"196-hanyu-hou-nian-jiu-ri-fu-shang-zaixiang-shu",title:"後廿九日復上宰相書背景資料",author:"韓愈本文作者——二十八歲的落第進士——困居長安——連續上書於宰相——這是最後一封——語氣從急切轉為冷靜、宰相未具名——據考證可能為趙憬、賈耽、盧邁等人——韓愈四度上書——皆不報——但這一次——韓愈不再憤怒——而是——用邏輯——把你架在那裡——你自己想想——你——是不是——對得起——宰相這個位置",era:"《韓昌黎集》——韓愈詩文合集，由其門人李漢編纂，共四十卷；〈後廿九日復上宰相書〉為韓愈三上宰相書之第三書（或第四書），是韓愈求仕系列書信中風格最獨特的一封——冷靜、犀利、以退為進"},
    {n:168,id:"197-hanyu-yu-yuxiangyang-shu",title:"與於襄陽書背景資料",author:"韓愈本文作者——唐代古文運動領袖——寫這封信時已非當年落魄書生、於頔於襄陽時任襄陽節度使——封燕國公——好士——喜接納文士——是當時有名的「好賢」節度使——但史書對其人品評價兩極——一方面禮賢下士——另一方面為人驕縱——晚年名聲不佳、韓愈推薦的友人信中未具名——據考證可能是侯喜或張籍——韓愈曾多次為友人作薦",era:"《韓昌黎集》——韓愈詩文合集，由其門人李漢編纂，共四十卷；〈與於襄陽書〉是韓愈寫給時任襄陽節度使於頔的一封推薦信，為韓愈「干謁書信」中最具策略性的一篇"},
    {n:169,id:"198-hanyu-yu-chen-jishi-shu",title:"與陳給事書背景資料",author:"韓愈本文作者——此時已入仕——任國子監四門博士——與陳京本為好友——卻屢屢吃閉門羹——寫這封信——不是為了求官——而是為了——挽回一段友誼、陳京字慶復——時任給事中——韓愈的舊識——對韓愈態度突然冷淡——韓愈多次拜訪皆不得見——原因不詳——可能與韓愈在官場的言行有關——也可能只是——陳京的個人情緒——史書對陳京的記載不多——但韓愈這封信——讓他——在文學史上——有了一席之地——作為——被韓愈寫信「挽回」的那個人",era:"《韓昌黎集》——韓愈詩文合集，由其門人李漢編纂，共四十卷；〈與陳給事書〉為韓愈寫給時任給事中陳京的書信，在韓愈的書信體作品中，是最「溫柔」的一封——沒有憤怒、沒有乞求、沒有道德綁架——只有——一個聰明人——如何用最體面的方式——修補一段關係"},
    {n:170,id:"199-hanyu-ying-kemu-shi-yu-ren-shu",title:"應科目時與人書背景資料",author:"韓愈本文作者——此時已通過進士考試——正在參加博學鴻詞科——以取得官職——三次考試均未通過——本文正是他在這場考試中——寫給考官的自薦信、韋舍人本文收信人——唐代中書省的舍人——負責草擬詔令——也是博學鴻詞科的考官之一——韓愈寫信給他——不是因為兩人之間有私交——而是因為——韋舍人——是掌握他命運的——考官——韓愈——用這封信——告訴韋舍人——「我——就是那條——你——不該——錯過的——龍」",era:"《韓昌黎集》——韓愈詩文合集，由其門人李漢編纂，共四十卷；〈應科目時與人書〉是韓愈參加博學鴻詞科考試時寫給某位考官（韋舍人）的信——它不是一封普通的求職信——而是一則——以龍為主角的——寓言——一封——將「求人」寫得——像「龍困淺灘」的——千古奇文"},
    {n:171,id:"200-hanyu-song-mengdongye-xu",title:"送孟東野序背景資料",author:"不快樂的詩人——才是好詩人——「大凡物不得其平則鳴」——草木無聲——風吹之則鳴——水無聲——風蕩之則鳴——金石無聲——敲擊之則鳴——人的語言也是如此——最好的文章——都是因為——作家心中的——不平之氣——從皋陶、禹、周公、孔子——到屈原、司馬遷、李白、杜甫——所有偉大的創作者——都是因為命運的不公平——才創作出——偉大的作品",era:"《韓昌黎集》——韓愈詩文合集，由其門人李漢編纂，共四十卷；〈送孟東野序〉是韓愈為好友孟郊（字東野）送別時所作的贈序——但這篇「送別文」——幾乎沒有在寫送別——而是在寫——一個殘酷的理論——「大凡物不得其平則鳴」——你的痛苦——才是你才華的來源——所以——不要——抱怨——你的——不幸"},
    {n:172,id:"201-hanyu-song-liyuan-gui-pangu-xu",title:"送李願歸盤谷序背景資料",author:"韓愈本文作者——以「送友人歸隱」為題——實則寫自己的人生觀照、李願韓愈的好友——隱居於盤谷——在文中作為韓愈「理想自我」的投射——他說出了韓愈心嚮往之卻做不到的人生選擇",era:"《韓昌黎集》——韓愈詩文合集，由其門人李漢編纂；〈送李願歸盤谷序〉為韓愈贈序體的代表作之一，與〈師說〉並為韓愈「送人」文章的雙璧"},
    {n:173,id:"202-hanyu-song-dongshaonan-xu",title:"送董邵南序背景資料",author:"韓愈本文作者——唐代古文運動領袖——「唐宋八大家」之首——董邵南的好友——他反對藩鎮割據——堅定支持中央集權——但面對好友去河北的決定——他不能——直接阻止——只能——用這篇——反話滿篇的——贈序——說出——最含蓄的——挽留、董邵南韓愈的好友——懷才不遇——在長安始終得不到重用——決定去河北投靠藩鎮——尋找機會——他的處境——與孟郊相似——但——他的選擇——比孟郊——更讓韓愈——為難——因為——他去的地方——是——韓愈——心中的——敵國",era:"《韓昌黎集》——韓愈詩文合集，由其門人李漢編纂；〈送董邵南序〉是韓愈為好友董邵南送別時所作的贈序——但這篇「送別文」——幾乎沒有在寫送別——而是在寫——最溫柔的挽留——用反話——說真話"},
    {n:174,id:"203-hanyu-song-yangshaoyin-xu",title:"送楊少尹序背景資料",author:"韓愈本文作者——唐代古文運動領袖——以贈序送別楊巨源——藉機討論「什麼是真正的勇氣」、楊巨源楊少尹韓愈的朋友——年老辭官——歸鄉養老——韓愈為他寫贈序送別——但韓愈的重點不在送別——而在為楊巨源的辭官尋找歷史的座標、疏廣、疏受西漢人——叔侄二人同時辭官歸鄉——朝廷公卿設宴送行——場面盛大——韓愈以二疏為對照——引出楊巨源的辭官更值得尊敬",era:"《韓昌黎集》——韓愈詩文合集，由其門人李漢編纂；〈送楊少尹序〉為韓愈贈序體的代表作之一，與〈送李願歸盤谷序〉〈送孟東野序〉並為韓愈三篇送別名序"},
    {n:175,id:"204-hanyu-song-shi-chushi-xu",title:"送石處士序背景資料",author:"韓愈本文作者——唐代古文運動領袖——「唐宋八大家」之首——此時他已歷經仕途起伏——對「出仕」與「守節」的兩難——有深刻的體會——他寫這篇序——與其說是在送石洪——不如說——是在——對所有——即將踏入官場的人——提出——一個——警告、石洪石處士洛陽名士——隱居十年——被烏重胤以厚禮聘請為幕僚——他是一個——「將出而未出」的隱士——在韓愈筆下——他被放到了一個——抉擇的——十字路口——每個人都——在看著他——看他——會怎麼走、烏重胤河陽節度使——一方軍閥——但他不是一般的武將——他「以鈇鉞鎮河陽」——卻對石洪「以禮為羅」——用禮儀和尊重——來網羅人才——韓愈對他的評價是——「將軍——真能以禮待士」——一個——真正——懂得——尊重——知識分子——的——將領",era:"《韓昌黎集》——韓愈詩文合集，由其門人李漢編纂；〈送石處士序〉為韓愈贈序體名篇，與〈送孟東野序〉、〈送李愿歸盤谷序〉並稱「韓愈三送」——但基調截然不同"},
    {n:176,id:"205-hanyu-song-wenchushi-fu-heyang-xu",title:"送溫處士赴河陽軍序背景資料",author:"韓愈本文作者——唐代古文運動領袖——「唐宋八大家」之首——他在同一年裡——為——烏重胤——徵召——的——兩位——處士——寫了——兩篇——送別序——一篇——嚴肅——一篇——幽默——展現了——他——作為——文章——大師——的——多面性、溫造溫處士洛陽名士——與石洪齊名——被烏重胤——徵召——為——河陽軍——幕僚——在——韓愈——筆下——他——不是——被——嚴肅——地——告誡——而是——被——幽默——地——送別——他——的——離開——被——比喻——為——「良馬——被——伯樂——挑走」——這是——一種——極高——的——讚美、烏重胤河陽節度使——文中——的——「伯樂」——他——先後——請走了——石洪——和——溫造——在——韓愈——筆下——他——不——只是——一個——將軍——更是——一個——「能——使——良馬——必——不——虛——北——行者」——的——知音——人、石洪〈送石處士序〉——的——主角——在——這篇——中——被——提及——作為——溫造——的——先例——「石生——去——矣」——顯示——烏重胤——的——求賢——是——一個——持續——的——過程——而非——一次——性——的——事件",era:"《韓昌黎集》——韓愈詩文合集，由其門人李漢編纂；〈送溫處士赴河陽軍序〉為韓愈贈序體名篇——與〈送石處士序〉堪稱「姊妹篇」——同一將軍——同一事件——同一主題——但基調截然不同"},
    {n:177,id:"206-hanyu-ji-shi-er-lang-wen",title:"祭十二郎文背景資料",author:"韓愈本文作者——唐代古文運動領袖——「唐宋八大家」之首——此時——他——36 歲——在——長安——擔任——監察御史——他——自幼——父母——雙亡——兄長——韓會——也——早逝——他——由——嫂嫂——鄭氏——撫養——長大——十二郎——是——他——在——這個——世界上——最——親近——的——人——十二郎——的——死——對——他——來說——不僅——是——失去——一個——侄子——而是——失去——了——他——與——童年——唯一——的——連結——他——與——家族——記憶——之間——的——橋樑——斷了、十二郎韓老成韓愈的侄子——韓愈——大哥——韓會——的——兒子——韓愈——曾——在——〈祭十二郎文〉——中——追述——兩人——從小——一起——長大——的——往事——「吾——與——汝——俱——少年——以為——雖——暫——相別——終——當——久——相——與——處」——十二郎——名——老成——排行——第十二——故——稱——「十二郎」——他——在——韓愈——生命中——的——意義——不僅——是——一個——親人——更是——一個——與——他——共擔——家族——苦難——的——夥伴——兩人——都是——孤兒——從小——相依——為命——十二郎——的死——讓——韓愈——感覺——自己——也——死了——一半",era:"《韓昌黎集》——韓愈詩文合集，由其門人李漢編纂；〈祭十二郎文〉被譽為「中國文學史上最偉大的祭文」——不是因為它寫得多好——而是因為它——真實到了——讓人——不敢——再看——第二遍"},
    {n:178,id:"207-hanyu-ji-e-yu-wen",title:"祭鱷魚文背景資料",author:"韓愈本文作者——唐代古文運動領袖——因諫迎佛骨被貶潮州——到任後——聽說鱷魚為患——寫了這篇祭文——據新唐書記載——祭文祭出當晚——暴風雷雨——鱷魚——真的——搬走了、鱷魚被驅逐的對象——在韓愈的筆下——它們不只是動物——而是——不聽天子命令——的——「頑民」——「與——刺史——亢拒——爭為長雄」、潮州百姓受鱷魚之害的百姓——韓愈為他們出頭",era:"《韓昌黎集》卷三十六——〈祭鱷魚文〉是韓愈被貶潮州時所作的一篇「祭文」——但——這不是一篇向神明祈福的祭文——而是一篇——命令鱷魚搬家的公告——「盡三日——其率醜類南徙於海」——韓愈用最嚴肅的態度——做了——一件最荒誕的事——他——對——一群鱷魚——下了——最後通牒"},
    {n:179,id:"208-hanyu-liuzihou-muzhi-ming",title:"柳子厚墓誌銘背景資料",author:"韓愈本文作者——唐代古文運動領袖——「唐宋八大家」之首——柳宗元——的——好友——與——論敵——兩人在——政治——上——有——分歧————韓愈——反對——王叔文——集團——而——柳宗元——是——該——集團——的——核心——人物——但在——文學——上——兩人——互相——欽佩——在——人格上——互相——尊重——韓愈——這篇——墓誌銘——寫得——極為——動情——因為——他——失去——了——一個——值得——尊敬——的——對手——和——朋友、柳宗元子厚逝者——字子厚——世稱「柳河東」——唐代——古文運動——的——另一面——旗幟——「唐宋八大家」——之一——與——韓愈——並稱——「韓柳」——他——年輕——時——參與——王叔文——的——「永貞革新」——失敗——後——被——貶——為——永州——司馬——今——湖南——永州——在那裡——待了——十年——後——又——被——貶——為——柳州刺史——今——廣西——柳州——最後——在——柳州——病逝——他——在——貶謫——中——寫下——了——〈永州八記〉——〈捕蛇者說〉——〈江雪〉——等——千古——名篇——他——的一生——是——一個——天才——在——政治——風暴——中——被——摧折——的——故事——但——韓愈——的——這篇——墓誌銘——讓——我們——看到——了——這個——故事——的——另一面————一個——人在——逆境——中——仍然——保持——了——他——的——尊嚴——和——節義",era:"《韓昌黎集》——韓愈詩文合集，由其門人李漢編纂；〈柳子厚墓誌銘〉是韓愈為好友柳宗元撰寫的墓誌銘，也是韓愈所有文章中「最像一個朋友寫給另一個朋友」的文章"},
    {n:180,id:"209-liuzongyuan-bo-fuchou-yi",title:"駁復讎議背景資料",author:"柳宗元本文作者——唐代古文運動旗手——「唐宋八大家」之一——被貶永州期間——從政治人物轉化為深刻的思想家——對法律、倫理、社會秩序有獨到的思考、陳子昂被批駁的對象——初唐詩人——曾針對徐元慶案提出「誅而旌之」的主張——即先依法治罪處死——再依禮表彰其孝行——柳宗元認為這是邏輯上的自我矛盾",era:"《柳河東集》——柳宗元詩文合集，由劉禹錫編纂；〈駁復讎議〉是柳宗元針對陳子昂「誅而旌之」主張所作的批駁，一篇鋒芒畢露的法律哲學論文"},
    {n:181,id:"210-liuzongyuan-tongye-fengdi-bian",title:"桐葉封弟辨背景資料",author:"柳宗元本文作者——唐代古文運動——另一位——領袖——「唐宋八大家」——之一——與——韓愈——並稱——「韓柳」——永貞——革新——失敗——後——被——貶——永州——司馬——在此期間——寫下——了大量——思想——深邃——的——議論文——本文——即——其中——代表——之一、周成王西周——第二位——天子——周武王——之子——幼年——即位——由——周公——攝政——本文——中——他——是——那個——「拿——桐葉——當——珪——說——要——封——弟弟」——的——君主、周公名旦——周武王——之弟——周成王——之叔——西周——開國——功臣——制禮——作樂——被——儒家——尊為——「聖人」——本文——中——柳宗元——質疑——的——就是——周公——是否——真的——如——傳說——所——說——以——「天子——無戲言」——為——由——強迫——成王——兌現——一句——玩笑——話、唐叔虞周成王——之弟——名——虞——封——於——唐——今——山西——翼城——故——稱——唐叔虞——晉國——的——始祖——他——在——本文——中——只是——那個——「被——封」——的人——本身——並——無——太多——思想——或——行動",era:"《柳河東集》——柳宗元詩文合集，由其好友劉禹錫編纂；〈桐葉封弟辨〉是柳宗元在永州貶謫時期所寫的一篇「辨」體文章——以——歷史——傳說——為——由頭——展開——對——「天子無戲言」——這個——命題——的——尖銳——質疑——篇幅——雖短——但——邏輯——嚴密——層層——推進——是——柳宗元——議論文——中——最具——思想——鋒芒——的——一篇——之一"},
    {n:182,id:"211-liuzongyuan-jizi-bei",title:"箕子碑背景資料",author:"柳宗元本文作者——唐代古文運動領袖之一——「唐宋八大家」——永貞革新——失敗——後——被——貶——永州——在——政治——逆境中——寫下——本文——藉——箕子——自況——為——自己——的——選擇——尋找——歷史——的——正名、箕子商紂王——的——叔父——與——比干——微子——並稱——「殷末三仁」——見——紂王——無道——進諫——不聽——乃——披髮——裝瘋——被——囚禁——為——奴——周武王——滅商——後——被——釋放——他向——武王——陳述——〈洪範〉——九疇——保存——了——商朝——的——禮樂——文化、比干紂王——的——叔父——因——強諫——被——紂王——剖心——而死——以——死——殉道——是——「忠——之——死」、微子紂王——的——庶兄——見——商朝——將亡——選擇——離開——國都——後——被——周——封——於——宋——是——「忠——之——去」",era:"《柳河東集》——柳宗元詩文合集，由其好友劉禹錫編纂；〈箕子碑〉是柳宗元為殷商名臣箕子撰寫的廟碑"},
    {n:183,id:"212-liuzongyuan-ziren-zhuan",title:"梓人傳背景資料",author:"柳宗元本文作者——唐代古文運動——領袖——之一——「唐宋八大家」——本文——寫於——他——還——在——長安——任職——期間——此時——他——的——文學——才華——和——政治——抱負——都——處於——上升——期——他——通過——梓人——的——故事——表達——了——自己——對——理想——治理——模式——的——思考、梓人木匠頭——本文——主角——一個——不會——具體——做木工——卻——精通——規劃——和——管理——的——工匠——柳宗元——用——他——來——比喻——理想——的——宰相——不——親自——處理——具體——政務——但——掌控——全局——知人——善任——是——「無為——而——治」——的——儒家——政治——理想——的——生動——體現、眾工匠本文——的——配角——各個——身懷——絕技——但——都——在——梓人——的——指揮——下——工作——他們——代表——了——朝廷——中——具體——做事——的——官員————每——個——人——都——需要——被——放在——對——的——位置——上",era:"《柳河東集》——柳宗元詩文合集，由其好友劉禹錫編纂；〈梓人傳〉是柳宗元在長安時期寫的一篇傳記體寓言——以——一個——不會——修床腿——卻——會——指揮——工匠——的——木匠頭——為——主角——表面——上——是——為——工匠——立傳——實際——上——是——在——闡述——宰相——之——道——是——中國——管理學——思想——的——經典——文本"},
    {n:184,id:"213-liuzongyuan-yongzhou-weishijun-xintang-ji",title:"永州韋使君新堂記背景資料",author:"柳宗元本文作者——唐代古文運動領袖——「唐宋八大家」——之一——永貞革新——失敗——後——被——貶——永州——司馬——在此期間——寫下——了大量——山水——遊記——和——議論——文——本文——是——他——在——永州——後期——所——作——借——韋使君——的——新堂——表達——了——他——對——「好——治理」——的——思考、韋使君名韋彪——永州刺史——柳宗元——在——永州——的上級——他——到任——後——發現——州府——旁——的——一塊——荒蕪——之地——經過——整治——建造——了——一座——新堂——柳宗元——在——文中——讚美——他——「善——於——發現——美」——和——「善——於——治理」——的——能力——但——更深——的——層次——上——柳宗元——是在——借——韋使君——的——做法——來——抒發——自己——的——政治——理想——「一個——好——的——管理者——應該——如何——對待——他——所——治理——的——地方？」",era:"《柳河東集》——柳宗元詩文合集，由好友劉禹錫編纂；〈永州韋使君新堂記〉是柳宗元在永州貶謫期間為永州刺史韋彪新落成的官署廳堂所寫的記文"},
    {n:185,id:"214-liuzongyuan-gumu-tanxi-xiaoqiu-ji",title:"鈷鉧潭西小丘記背景資料",author:"柳宗元本文作者——唐代古文運動領袖之一——「唐宋八大家」——永貞革新失敗後被貶永州——從政治中心跌入偏遠荒涼之地——他開始在山水間尋找慰藉——寫下了中國文學史上最著名的山水遊記——「永州八記」",era:"《柳河東集》——柳宗元詩文合集，由其好友劉禹錫編纂；〈鈷鉧潭西小丘記〉是「永州八記」第三篇，寫於柳宗元發現並購得一座被遺棄的小山丘之後"},

  function juanOf(era){
    if(/左傳|國語|戰國策|楚辭|春秋|檀弓|公羊/.test(era)) return "周文";
    if(/秦文|李斯/.test(era)) return "秦文";
    if(/史記|漢|詔|本紀|世家|列傳/.test(era)) return "漢文";
    if(/六朝|晉|宋齊|魏/.test(era)) return "六朝文";
    if(/唐/.test(era)) return "唐文";
    if(/宋文|宋$/.test(era)) return "宋文";
    if(/明/.test(era)) return "明文";
    if(/清/.test(era)) return "清文";
    return "其他";
  }
  function genreOf(t){
    const last=t[t.length-1];
    if(last==="記") return "記";
    if(last==="序") return "序";
    if(last==="表") return "表";
    if(last==="賦") return "賦";
    if(last==="書") return "書";
    if(last==="說"||last==="説") return "說";
    if(last==="傳") return "傳";
    if(last==="論") return "論";
    if(last==="辭") return "辭";
    if(/檄|討武/.test(t)) return "檄";
    if(/原道|廉恥|進學解|十思疏/.test(t)) return "論";
    if(/卜居/.test(t)) return "辭";
    return "史傳";
  }
  const ESSAYS = RAW.map(e=>({...e, dynasty:juanOf(e.era), genre:genreOf(e.title)}));

  const READ_KEY = "guwen:read";
  let read = (()=>{ try { return new Set(JSON.parse(localStorage.getItem(READ_KEY)||"[]")); } catch(e){ return new Set(); } })();
  let dim = "卷次";
  let query = "";

  const DIM_SUBS = { 周文:"左傳・國語・戰國策・楚辭", 秦文:"李斯", 漢文:"史記・兩漢", 六朝文:"晉宋齊", 唐文:"韓柳諸家", 宋文:"歐蘇王曾", 明文:"宋濂・歸有光", 清文:"顧炎武" };
  const JUAN = { 周文:"卷一 ─ 四", 秦文:"卷四", 漢文:"卷五 ─ 六", 六朝文:"卷七", 唐文:"卷七 ─ 九", 宋文:"卷九 ─ 十一", 明文:"卷十二", 清文:"補遺" };
  const DYN_ORDER = ["周文","秦文","漢文","六朝文","唐文","宋文","明文","清文","其他"];
  const GENRE_ORDER = ["史傳","論","記","序","表","賦","書","說","傳","辭","檄"];

  function el(tag, cls, html){ const n=document.createElement(tag); if(cls) n.className=cls; if(html!=null) n.innerHTML=html; return n; }

  function buildGroups(){
    const q = query.trim();
    const filtered = ESSAYS.filter(e => !q || e.title.includes(q) || e.author.includes(q) || e.era.includes(q));
    if(dim==="全部"){
      return [{label:"全部選文", sub:"依吳氏選本卷次", items:filtered.slice().sort((a,b)=>a.n-b.n)}];
    }
    const key = dim==="卷次" ? "dynasty" : dim==="作者" ? "author" : "genre";
    let order;
    if(dim==="卷次") order = DYN_ORDER;
    else if(dim==="文體") order = GENRE_ORDER;
    else order = [...new Set(ESSAYS.map(e=>e.author).filter(Boolean))];
    const map = {};
    filtered.forEach(e=>{ const k=e[key]||"其他"; (map[k]=map[k]||[]).push(e); });
    const seen = order.filter(k=>map[k]);
    Object.keys(map).forEach(k=>{ if(seen.indexOf(k)<0) seen.push(k); });
    return seen.map(k=>({
      label:k, sub: dim==="卷次" ? (DIM_SUBS[k]||"") : "", juan: dim==="卷次" ? (JUAN[k]||"") : "",
      items: map[k].sort((a,b)=>a.n-b.n)
    }));
  }

  function renderTabs(){
    const wrap = document.getElementById("tabs");
    wrap.innerHTML = "";
    ["卷次","作者","文體","全部"].forEach(name=>{
      const label = name==="全部" ? "全部" : "依"+name;
      const b = el("button", "tab"+(name===dim?" active":""), "<span>"+label+"</span>");
      b.onclick = ()=>{ dim=name; renderTabs(); renderList(); };
      wrap.appendChild(b);
    });
  }

  function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  function renderList(){
    const groups = buildGroups();
    const q = query.trim();
    const count = ESSAYS.filter(e=>!q||e.title.includes(q)||e.author.includes(q)||e.era.includes(q)).length;
    document.getElementById("resultMeta").textContent = "共 "+count+" 篇 · 依"+dim+"排列";

    const list = document.getElementById("list");
    list.innerHTML = "";
    groups.forEach(g=>{
      const sec = el("section","group");
      const head = el("div","group-head");
      head.innerHTML =
        '<div class="gh-left"><span class="diamond"></span><h2>'+esc(g.label)+'</h2></div>'+
        (g.juan ? '<span class="juan-tag">'+esc(g.juan)+'</span>' : '')+
        '<span class="gh-sub">'+esc(g.sub||"")+'</span>'+
        '<span class="gh-count">'+g.items.length+' 篇</span>';
      sec.appendChild(head);

      const gl = el("div","group-list");
      g.items.forEach(e=>{
        const isRead = read.has(e.id);
        const row = el("div","row");
        row.innerHTML =
          '<span class="num">'+String(e.n).padStart(2,"0")+'</span>'+
          '<a class="link" href="articles/'+e.id+'.html">'+
            '<span class="title">'+esc(e.title)+'</span>'+
            '<span class="author">'+esc(e.author)+'</span>'+
            '<span class="era">'+esc(e.era)+'</span>'+
          '</a>'+
          '<span class="genre">'+esc(e.genre)+'</span>'+
          '<span class="mark" title="標記已讀">'+
            (isRead ? '<span class="seal">讀</span>' : '<span class="dot"></span>')+
          '</span>';
        row.querySelector(".mark").onclick = (ev)=>{ ev.preventDefault(); toggleRead(e.id); };
        gl.appendChild(row);
      });
      sec.appendChild(gl);
      list.appendChild(sec);
    });
  }

  function renderProgress(){
    const total = ESSAYS.length;
    const rc = ESSAYS.filter(e=>read.has(e.id)).length;
    document.getElementById("readCount").textContent = rc;
    document.getElementById("totalCount").textContent = total;
    document.getElementById("corpusCount").textContent = total;
    document.getElementById("progressFill").style.width = (total? Math.round(rc/total*100):0)+"%";
  }

  function toggleRead(id){
    read.has(id) ? read.delete(id) : read.add(id);
    try { localStorage.setItem(READ_KEY, JSON.stringify([...read])); } catch(e){}
    renderList(); renderProgress();
  }

  document.getElementById("search").addEventListener("input", (e)=>{ query=e.target.value; renderList(); });

  renderTabs();
  renderList();
  renderProgress();
  </script>
