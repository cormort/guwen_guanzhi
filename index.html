        function renderList(data, containerId) {
            const list = document.getElementById(containerId);
            list.innerHTML = "";
            data.forEach((e, i) => {
                const a = document.createElement("a");
                a.href = `articles/${e.id}.html`;
                a.className = "essay-link";
                a.innerHTML = `
                    <span class="num">${String(i+1).padStart(2, "0")}</span>
                    <span class="title">${e.title}</span>
                    <span class="author">${e.author}</span>
                    <span class="era">${e.era}</span>
                    <span class="badges"><span class="badge done">完成✓</span></span>
                `;
                list.appendChild(a);
            });
        }

        function switchPhase(n) {
            document.querySelectorAll(".card").forEach(c => c.classList.remove("active"));
            document.querySelectorAll(".card")[n-1].classList.add("active");
            document.getElementById("phase1-section").style.display = n === 1 ? "block" : "none";
            document.getElementById("phase2-section").style.display = n === 2 ? "block" : "none";
        }

        renderList(phase2, "essay-list-p2");
